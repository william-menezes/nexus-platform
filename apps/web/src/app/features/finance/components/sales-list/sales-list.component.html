<p-breadcrumb [model]="breadcrumbs" [home]="homeItem" styleClass="nx-breadcrumb mb-4" />

<div class="nx-page">

  <div class="nx-page-header">
    <h1 class="nx-page-title">Vendas</h1>
    <div style="display:flex; gap:0.75rem;">
      <a routerLink="../dre">
        <p-button label="DRE" icon="pi pi-chart-bar" severity="secondary" [outlined]="true" />
      </a>
      <a routerLink="../pdv">
        <p-button label="Nova venda (PDV)" icon="pi pi-plus" />
      </a>
    </div>
  </div>

  <p-table
    [value]="sales()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="15"
    [rowHover]="true"
    styleClass="p-datatable-sm"
    [tableStyle]="{'min-width':'600px'}"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Data</th>
        <th>OS vinculada</th>
        <th style="text-align:right;">Total</th>
        <th style="text-align:right;">Pago</th>
        <th>Status</th>
        <th></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-sale>
      <tr>
        <td style="color:var(--p-text-muted-color);">{{ sale.createdAt | date:'dd/MM/yyyy HH:mm' }}</td>
        <td style="font-family:monospace; font-size:0.8em; color:var(--p-text-muted-color);">
          {{ sale.serviceOrderId ? (sale.serviceOrderId | slice:0:8) + '…' : '—' }}
        </td>
        <td style="text-align:right; font-weight:600;">{{ sale.total | currency:'BRL' }}</td>
        <td style="text-align:right;">{{ sale.paidAmount | currency:'BRL' }}</td>
        <td>
          <p-tag
            [value]="statusLabel(sale.status)"
            [severity]="sale.status === 'paid' ? 'success' : sale.status === 'open' ? 'warn' : 'danger'"
          />
        </td>
        <td style="text-align:right;">
          @if (sale.status === 'open') {
            <p-button
              label="Cancelar"
              severity="danger"
              [outlined]="true"
              size="small"
              (click)="cancel(sale.id)"
            />
          }
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" style="text-align:center; color:var(--p-text-muted-color); padding:3rem;">
          <i class="pi pi-shopping-cart" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
          Nenhuma venda registrada.
        </td>
      </tr>
    </ng-template>
  </p-table>

</div>
