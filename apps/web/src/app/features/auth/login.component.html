<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <span class="auth-logo">N</span>
      <h1>Nexus Platform</h1>
      <p>Entre na sua conta</p>
    </div>

    @if (error) {
      <p-message severity="error" [text]="error" styleClass="w-full mb-4" />
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="nx-form">

      <div class="nx-form-group">
        <label class="nx-form-label" for="email">E-mail</label>
        <input
          pInputText
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="seu@email.com"
          class="w-full"
          [class.ng-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <small class="p-error">E-mail inválido.</small>
        }
      </div>

      <div class="nx-form-group">
        <label class="nx-form-label" for="password">Senha</label>
        <p-password
          formControlName="password"
          inputId="password"
          [feedback]="false"
          [toggleMask]="true"
          autocomplete="current-password"
          placeholder="••••••••"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <small class="p-error">Senha deve ter pelo menos 6 caracteres.</small>
        }
      </div>

      <div class="nx-form-actions">
        <p-button
          type="submit"
          label="Entrar"
          [loading]="loading"
          [disabled]="form.invalid"
          styleClass="w-full"
        />
      </div>

    </form>

    <div class="auth-footer">
      Não tem conta?
      <a routerLink="/cadastro">Criar conta</a>
    </div>

  </div>
</div>
