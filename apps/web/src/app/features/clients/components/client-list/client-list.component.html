<div class="nx-page">

  <div class="nx-page-header">
    <h1 class="nx-page-title">Clientes</h1>
    <a routerLink="novo">
      <p-button label="Novo Cliente" icon="pi pi-plus" />
    </a>
  </div>

  <div style="margin-bottom:1rem;">
    <span class="p-input-icon-left" style="width:100%; max-width:360px;">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="Buscar por nome ou CPF/CNPJ..."
        [(ngModel)]="search"
        (keyup.enter)="onSearch()"
        style="width:100%;"
      />
    </span>
  </div>

  @if (error) {
    <p-message severity="error" [text]="error" styleClass="w-full mb-4" />
  }

  <p-table
    [value]="clients"
    [loading]="loading"
    [paginator]="true"
    [rows]="15"
    [rowHover]="true"
    styleClass="p-datatable-sm"
    [tableStyle]="{'min-width':'600px'}"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Nome</th>
        <th>Tipo</th>
        <th>CPF/CNPJ</th>
        <th>Telefone</th>
        <th>Email</th>
        <th>Cadastro</th>
        <th></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-client>
      <tr>
        <td><strong>{{ client.name }}</strong></td>
        <td>
          <p-tag
            [value]="client.type === 'individual' ? 'Pessoa Física' : 'Pessoa Jurídica'"
            [severity]="client.type === 'individual' ? 'info' : 'secondary'"
          />
        </td>
        <td>{{ client.cpfCnpj || '—' }}</td>
        <td>{{ client.phone || '—' }}</td>
        <td>{{ client.email || '—' }}</td>
        <td>{{ client.createdAt | date:'dd/MM/yyyy' }}</td>
        <td>
          <div style="display:flex; gap:0.5rem;">
            <a [routerLink]="client.id">
              <p-button icon="pi pi-eye" severity="secondary" [outlined]="true" size="small" pTooltip="Ver detalhes" />
            </a>
            <a [routerLink]="[client.id, 'editar']">
              <p-button icon="pi pi-pencil" severity="secondary" [outlined]="true" size="small" pTooltip="Editar" />
            </a>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" style="text-align:center; color:var(--p-text-muted-color); padding:3rem;">
          <i class="pi pi-users" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
          Nenhum cliente encontrado.
        </td>
      </tr>
    </ng-template>
  </p-table>

</div>
