<div class="nx-page">

  <div class="nx-page-header">
    <h1 class="nx-page-title">Ordens de Serviço</h1>
    <a routerLink="nova">
      <p-button label="Nova OS" icon="pi pi-plus" />
    </a>
  </div>

  @if (error()) {
    <p-message severity="error" [text]="error()" styleClass="w-full mb-4" />
  }

  <p-table
    [value]="orders()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="15"
    [rowHover]="true"
    styleClass="p-datatable-sm"
    [tableStyle]="{'min-width':'600px'}"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Código</th>
        <th>Cliente</th>
        <th>Descrição</th>
        <th>Status</th>
        <th>Data</th>
        <th></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-os>
      <tr>
        <td><code style="font-family:monospace; font-size:0.85em;">{{ os.code }}</code></td>
        <td>{{ os.clientName }}</td>
        <td style="max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
          {{ os.description }}
        </td>
        <td>
          <p-tag
            [value]="statusLabel[os.status]"
            [severity]="statusSeverity[os.status]"
          />
        </td>
        <td>{{ os.createdAt | date:'dd/MM/yyyy' }}</td>
        <td>
          <div style="display:flex; gap:0.5rem;">
            <a [routerLink]="os.id">
              <p-button icon="pi pi-eye" severity="secondary" [outlined]="true" size="small" pTooltip="Ver detalhes" />
            </a>
            <a [routerLink]="[os.id, 'editar']">
              <p-button icon="pi pi-pencil" severity="secondary" [outlined]="true" size="small" pTooltip="Editar" />
            </a>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" style="text-align:center; color:var(--p-text-muted-color); padding:3rem;">
          <i class="pi pi-inbox" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
          Nenhuma OS encontrada.
        </td>
      </tr>
    </ng-template>
  </p-table>

</div>
