<p-toast />
<p-confirmDialog />


<div class="nx-page">
  <app-page-header variant="list" title="Serviços" subtitle="Catálogo de serviços oferecidos">
    <div actions class="flex items-center gap-2">
      <a routerLink="novo" pButton label="Novo Serviço" icon="pi pi-plus" class="p-button-sm"></a>
    </div>
  </app-page-header>
  <p-card styleClass="w-full">
    <div class="mb-3">
      <input pInputText [(ngModel)]="search" (ngModelChange)="load()" placeholder="Buscar serviço..." class="w-full md:w-1/3" />
    </div>
    <div class="overflow-x-auto">
    <p-table
      [value]="services()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="tablePage().rows"
      [first]="tablePage().first"
      [rowsPerPageOptions]="rowsPerPageOptions"
      [rowHover]="true"
      sortMode="single"
      styleClass="nx-data-table p-datatable-sm"
      [tableStyle]="{ 'min-width': '860px' }"
      (onPage)="onPageChange($event)"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">Nome <p-sortIcon field="name" /></th>
          <th>Descrição</th>
          <th pSortableColumn="defaultPrice">Preço Padrão <p-sortIcon field="defaultPrice" /></th>
          <th pSortableColumn="estimatedHours">Horas Est. <p-sortIcon field="estimatedHours" /></th>
          <th pSortableColumn="isActive">Status <p-sortIcon field="isActive" /></th>
          <th>Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-s>
        <tr>
          <td>{{ s.name }}</td>
          <td>{{ s.description || '—' }}</td>
          <td>{{ s.defaultPrice | currency:'BRL' }}</td>
          <td>{{ s.estimatedHours ? s.estimatedHours + 'h' : '—' }}</td>
          <td>
            <p-tag [severity]="s.isActive ? 'success' : 'danger'" [value]="s.isActive ? 'Ativo' : 'Inativo'" />
          </td>
          <td>
            <a [routerLink]="[s.id, 'editar']" pButton icon="pi pi-pencil" class="p-button-sm p-button-text mr-1"></a>
            <button pButton icon="pi pi-trash" class="p-button-sm p-button-text p-button-danger" (click)="confirmDelete(s)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6">
            <div class="nx-table-empty">
              <span class="nx-table-empty__icon"><i class="pi pi-briefcase"></i></span>
              <span class="nx-table-empty__title">Nenhum serviço encontrado</span>
              <div class="nx-table-empty__description">Monte o catálogo de serviços para usar em orçamentos e OS.</div>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="paginatorleft">
        <span class="nx-table-summary">{{ tableSummary() }}</span>
      </ng-template>
    </p-table>
    </div>
  </p-card>
</div>
