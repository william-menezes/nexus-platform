<p-toast />
<p-confirmDialog />
<div class="nx-page">
  <app-page-header variant="list" title="Serviços" subtitle="Catálogo de serviços oferecidos">
    <div actions class="flex items-center gap-2">
      <a routerLink="novo" pButton label="Novo Serviço" icon="pi pi-plus" class="p-button-sm"></a>
    </div>
  </app-page-header>

  <div class="rounded-xl border border-surface-border bg-surface-elevated shadow-sm overflow-hidden">
    <!-- Toolbar -->
    <div class="flex items-center justify-between gap-3 px-4 py-3 border-b border-surface-border flex-wrap">
      <!-- left: search -->
      <div class="relative flex-1 min-w-[180px] max-w-sm">
        <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-sm pointer-events-none"></i>
        <input type="text" placeholder="Buscar serviço..." [(ngModel)]="search" (ngModelChange)="load()"
          class="block w-full rounded-md border border-surface-border bg-surface pl-9 pr-3 py-2 text-sm text-text placeholder:text-text-muted focus:border-primary-500 focus:ring-1 focus:ring-primary-500 focus:outline-none transition-colors"
          aria-label="Buscar serviço" />
      </div>
      <!-- right: filters (none) -->
      <div class="flex items-center gap-2 flex-wrap"></div>
    </div>

    <div class="overflow-x-auto">
      <p-table
        [value]="services()"
        [loading]="loading()"
        [paginator]="true"
        [rows]="tablePage().rows"
        [first]="tablePage().first"
        [rowsPerPageOptions]="rowsPerPageOptions"
        [rowHover]="true"
        sortMode="single"
        styleClass="nx-data-table p-datatable-sm"
        [tableStyle]="{ 'min-width': '860px' }"
        (onPage)="onPageChange($event)"
      >
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="name">Nome <p-sortIcon field="name" /></th>
            <th>Descrição</th>
            <th pSortableColumn="defaultPrice">Preço Padrão <p-sortIcon field="defaultPrice" /></th>
            <th pSortableColumn="estimatedHours">Horas Est. <p-sortIcon field="estimatedHours" /></th>
            <th pSortableColumn="isActive">Status <p-sortIcon field="isActive" /></th>
            <th>Ações</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-s>
          <tr class="group">
            <td>{{ s.name }}</td>
            <td>{{ s.description || '—' }}</td>
            <td>{{ s.defaultPrice | currency:'BRL' }}</td>
            <td>{{ s.estimatedHours ? s.estimatedHours + 'h' : '—' }}</td>
            <td>
              <p-tag [severity]="s.isActive ? 'success' : 'danger'" [value]="s.isActive ? 'Ativo' : 'Inativo'" />
            </td>
            <td>
              <div class="flex items-center justify-end gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
                <a [routerLink]="[s.id, 'editar']" pButton icon="pi pi-pencil" class="p-button-sm p-button-text"></a>
                <button pButton icon="pi pi-trash" class="p-button-sm p-button-text p-button-danger" (click)="confirmDelete(s)"></button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="6">
              <div class="nx-table-empty">
                <span class="nx-table-empty__icon"><i class="pi pi-briefcase"></i></span>
                <span class="nx-table-empty__title">Nenhum serviço encontrado</span>
                <div class="nx-table-empty__description">Monte o catálogo de serviços para usar em orçamentos e OS.</div>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="paginatorleft">
          <span class="nx-table-summary">{{ tableSummary() }}</span>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>
