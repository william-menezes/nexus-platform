<p-toast />


<div class="nx-page">
  <div class="nx-page-header">
    <div class="flex items-center gap-3">
      <a routerLink="/app/servicos" pButton icon="pi pi-arrow-left" class="p-button-text p-button-sm flex-shrink-0" aria-label="Voltar"></a>
      <div>
        <h1 class="nx-page-title">{{ isEdit ? 'Editar Serviço' : 'Novo Serviço' }}</h1>
        <p class="nx-page-subtitle">Preencha os dados do serviço</p>
      </div>
    </div>
  </div>
  <form [formGroup]="form" (ngSubmit)="save()">
    <p-card>
      <div class="flex flex-col gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-text">Nome *</label>
          <input pInputText formControlName="name" class="w-full" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-text">Descrição</label>
          <textarea pTextarea formControlName="description" rows="3"></textarea>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-text">Preço Padrão *</label>
          <p-inputNumber formControlName="defaultPrice" mode="currency" currency="BRL" locale="pt-BR" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-text">Horas Estimadas</label>
          <p-inputNumber formControlName="estimatedHours" [min]="0" [minFractionDigits]="1" suffix="h" />
        </div>
        <div class="flex items-center gap-2">
          <p-toggleButton formControlName="isActive" onLabel="Ativo" offLabel="Inativo" />
        </div>
      </div>
      <ng-template pTemplate="footer">
        <div class="flex justify-end gap-2">
          <a routerLink="/app/servicos" pButton class="p-button-outlined p-button-sm" label="Cancelar"></a>
          <button pButton type="submit" label="Salvar" [loading]="saving()" [disabled]="form.invalid" class="p-button-sm"></button>
        </div>
      </ng-template>
    </p-card>
  </form>
</div>
