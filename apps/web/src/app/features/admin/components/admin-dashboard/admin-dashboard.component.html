<p-breadcrumb [model]="breadcrumbs" [home]="homeItem" styleClass="nx-breadcrumb mb-4" />
<div class="nx-page">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold">Painel Super Admin</h1>
      <p class="text-text-secondary text-sm mt-1">Visão geral de todos os tenants</p>
    </div>
    <a routerLink="tenants" pButton label="Ver Tenants" icon="pi pi-list" class="p-button-sm"></a>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" *ngIf="metrics(); else loadingTpl">
    <div class="bg-surface rounded-xl border border-surface-border p-5 flex flex-col gap-2">
      <span class="text-sm text-text-secondary">Total de Tenants</span>
      <span class="text-3xl font-bold text-text">{{ metrics()!.totalTenants }}</span>
      <span class="text-xs text-text-muted">todos os cadastrados</span>
    </div>
    <div class="bg-surface rounded-xl border border-surface-border p-5 flex flex-col gap-2">
      <span class="text-sm text-text-secondary">Tenants Ativos</span>
      <span class="text-3xl font-bold text-green-600">{{ metrics()!.activeTenants }}</span>
      <span class="text-xs text-text-muted">is_active = true</span>
    </div>
    <div class="bg-surface rounded-xl border border-surface-border p-5 flex flex-col gap-2">
      <span class="text-sm text-text-secondary">Em Trial</span>
      <span class="text-3xl font-bold text-blue-600">{{ metrics()!.trialTenants }}</span>
      <span class="text-xs text-text-muted">plano = trial</span>
    </div>
    <div class="bg-surface rounded-xl border border-surface-border p-5 flex flex-col gap-2">
      <span class="text-sm text-text-secondary">Novos (30 dias)</span>
      <span class="text-3xl font-bold text-blue-600">{{ metrics()!.recentSignups }}</span>
      <span class="text-xs text-text-muted">últimos 30 dias</span>
    </div>
  </div>

  <ng-template #loadingTpl>
    <div class="flex justify-center py-12">
      <i class="pi pi-spin pi-spinner text-3xl text-text-muted"></i>
    </div>
  </ng-template>

  <!-- Quick link -->
  <p-card header="Ações Rápidas">
    <div class="flex flex-wrap gap-3">
      <a routerLink="tenants" pButton label="Gerenciar Tenants"
        icon="pi pi-building" class="p-button-outlined p-button-sm"></a>
    </div>
  </p-card>
</div>
