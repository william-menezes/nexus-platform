<p-toast />
<p-confirmDialog />
<p-breadcrumb [model]="breadcrumbs" [home]="homeItem" styleClass="nx-breadcrumb mb-4" />
<div class="nx-page">
  <div class="nx-page-header">
    <div>
      <h1 class="nx-page-title">Tipos de Equipamento</h1>
      <p class="nx-page-subtitle">Categorias de equipamentos para OS</p>
    </div>
    <button pButton label="Novo Tipo" icon="pi pi-plus" class="p-button-sm" (click)="openDialog()"></button>
  </div>
  <div class="overflow-x-auto">
    <p-table
      [value]="types()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="tablePage().rows"
      [first]="tablePage().first"
      [rowsPerPageOptions]="rowsPerPageOptions"
      [rowHover]="true"
      sortMode="single"
      styleClass="nx-data-table p-datatable-sm"
      [tableStyle]="{ 'min-width': '640px' }"
      (onPage)="onPageChange($event)"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">Nome <p-sortIcon field="name" /></th>
          <th>Campos</th>
          <th>A??es</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-t>
        <tr>
          <td>{{ t.name }}</td>
          <td>{{ (t.fieldsSchema || []).length }} campo(s)</td>
          <td>
            <button pButton icon="pi pi-pencil" class="p-button-sm p-button-text mr-1" (click)="openDialog(t)"></button>
            <button pButton icon="pi pi-trash" class="p-button-sm p-button-text p-button-danger" (click)="confirmDelete(t)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3">
            <div class="nx-table-empty">
              <span class="nx-table-empty__icon"><i class="pi pi-cog"></i></span>
              <span class="nx-table-empty__title">Nenhum tipo encontrado</span>
              <div class="nx-table-empty__description">Crie tipos para padronizar os equipamentos aceitos no sistema.</div>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="paginatorleft">
        <span class="nx-table-summary">{{ tableSummary() }}</span>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog [(visible)]="dialogVisible" [header]="editId ? 'Editar Tipo' : 'Novo Tipo'" [modal]="true" [style]="{ width: '400px' }">
  <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-3 pt-2">
    <div class="flex flex-col gap-1">
      <label class="text-text">Nome *</label>
      <input pInputText formControlName="name" class="w-full" />
    </div>
    <div class="flex justify-end gap-2 mt-2">
      <button pButton type="button" label="Cancelar" class="p-button-secondary" (click)="dialogVisible = false"></button>
      <button pButton type="submit" label="Salvar" [loading]="saving()" [disabled]="form.invalid"></button>
    </div>
  </form>
</p-dialog>
