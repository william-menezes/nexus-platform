<p-toast />
<p-confirmDialog />
<div class="nx-page">
  <app-page-header variant="list" title="Tipos de Equipamento" subtitle="Categorias de equipamentos para OS">
    <div actions class="flex items-center gap-2">
      <p-button label="Novo Tipo" icon="pi pi-plus" styleClass="p-button-sm" (onClick)="openDialog()" />
    </div>
  </app-page-header>

  <div class="rounded-xl border border-surface-border bg-surface-elevated shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <p-table
        [value]="types()"
        [loading]="loading()"
        [paginator]="true"
        [rows]="tablePage().rows"
        [first]="tablePage().first"
        [rowsPerPageOptions]="rowsPerPageOptions"
        [rowHover]="true"
        sortMode="single"
        styleClass="nx-data-table p-datatable-sm"
        [tableStyle]="{ 'min-width': '640px' }"
        (onPage)="onPageChange($event)"
      >
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="name">Nome <p-sortIcon field="name" /></th>
            <th>Campos</th>
            <th>Ações</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-t>
          <tr class="group">
            <td>{{ t.name }}</td>
            <td>{{ (t.fieldsSchema || []).length }} campo(s)</td>
            <td>
              <div class="flex items-center justify-end gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
                <p-button icon="pi pi-pencil" [text]="true" styleClass="p-button-sm" pTooltip="Editar"
                  (onClick)="openDialog(t)" />
                <p-button icon="pi pi-trash" severity="danger" [text]="true" styleClass="p-button-sm" pTooltip="Excluir"
                  (onClick)="confirmDelete(t)" />
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="3">
              <div class="nx-table-empty">
                <span class="nx-table-empty__icon"><i class="pi pi-cog"></i></span>
                <span class="nx-table-empty__title">Nenhum tipo encontrado</span>
                <div class="nx-table-empty__description">Crie tipos para padronizar os equipamentos aceitos no sistema.</div>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="paginatorleft">
          <span class="nx-table-summary">{{ tableSummary() }}</span>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>

<p-dialog [(visible)]="dialogVisible" [header]="editId ? 'Editar Tipo' : 'Novo Tipo'" [modal]="true" [style]="{ width: '400px' }">
  <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-3 pt-2">
    <div class="flex flex-col gap-1">
      <label class="text-text">Nome *</label>
      <input pInputText formControlName="name" class="w-full" />
    </div>
    <div class="flex justify-end gap-2 mt-2">
      <button pButton type="button" label="Cancelar" class="p-button-secondary p-button-sm" (click)="dialogVisible = false"></button>
      <button pButton type="submit" label="Salvar" [loading]="saving()" [disabled]="form.invalid" class="p-button-sm"></button>
    </div>
  </form>
</p-dialog>
