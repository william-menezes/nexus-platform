<p-toast />
<div class="nx-page">
  <app-page-header
    variant="detail"
    backLabel="Voltar para Equipamentos"
    backRoute="/app/equipamentos"
    [title]="isEdit ? 'Editar Equipamento' : 'Novo Equipamento'"
    subtitle="Preencha os dados do equipamento"
  />
  <p-card styleClass="w-full">
    <form [formGroup]="form" class="flex flex-col gap-3">
      <div class="flex flex-col gap-1">
        <label class="text-text">Tipo de Equipamento *</label>
        <p-select formControlName="equipmentTypeId" [options]="types()" optionLabel="name" optionValue="id" placeholder="Selecione..." styleClass="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-text">Marca</label>
        <input pInputText formControlName="brand" class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-text">Modelo</label>
        <input pInputText formControlName="model" class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-text">Observações</label>
        <textarea pTextarea formControlName="notes" rows="3" class="w-full"></textarea>
      </div>
    </form>
    <ng-template pTemplate="footer">
      <div class="flex justify-end gap-2">
        <a routerLink="/app/equipamentos">
          <p-button label="Cancelar" severity="secondary" [outlined]="true" styleClass="p-button-sm" />
        </a>
        <p-button label="Salvar" icon="pi pi-check" [loading]="saving()" [disabled]="form.invalid"
                  (onClick)="save()" styleClass="p-button-sm" />
      </div>
    </ng-template>
  </p-card>
</div>
