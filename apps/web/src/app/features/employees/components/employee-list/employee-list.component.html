<p-toast />
<p-confirmDialog />
<p-breadcrumb [model]="breadcrumbs" [home]="homeItem" styleClass="nx-breadcrumb mb-4" />
<div class="nx-page">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold text-text">Funcionários</h1>
    <div class="flex gap-2">
      <a routerLink="convidar" pButton label="Convidar" icon="pi pi-envelope" class="p-button-sm p-button-outlined"></a>
      <a routerLink="novo" pButton label="Novo Funcionário" icon="pi pi-plus" class="p-button-sm"></a>
    </div>
  </div>
  <div class="mb-3">
    <input pInputText [(ngModel)]="search" (ngModelChange)="load()" placeholder="Buscar por nome..." class="w-full md:w-1/3" />
  </div>
  <div class="overflow-x-auto">
    <p-table [value]="employees()" [loading]="loading()" stripedRows>
      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Cargo</th>
          <th>Telefone</th>
          <th>Email</th>
          <th>Comissão</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-e>
        <tr>
          <td>{{ e.name }}</td>
          <td>{{ e.roleLabel || '—' }}</td>
          <td>{{ e.phone || '—' }}</td>
          <td>{{ e.email || '—' }}</td>
          <td>{{ e.commissionRate }}%</td>
          <td>
            <p-tag [severity]="e.isActive ? 'success' : 'danger'" [value]="e.isActive ? 'Ativo' : 'Inativo'" />
          </td>
          <td>
            <a [routerLink]="[e.id, 'editar']" pButton icon="pi pi-pencil" class="p-button-sm p-button-text mr-1"></a>
            <button pButton icon="pi pi-trash" class="p-button-sm p-button-text p-button-danger" (click)="confirmDelete(e)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="7" class="text-center py-8 text-text-muted">Nenhum funcionário encontrado</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>
