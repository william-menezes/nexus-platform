<p-toast />
<p-breadcrumb [model]="breadcrumbs" [home]="homeItem" styleClass="nx-breadcrumb mb-4" />
<div class="nx-page max-w-lg">
  <div class="nx-page-header">
    <div>
      <h1 class="nx-page-title">{{ isEdit ? 'Editar Funcionário' : 'Novo Funcionário' }}</h1>
      <p class="nx-page-subtitle">Preencha os dados do funcionário</p>
    </div>
    <a routerLink="/app/funcionarios" pButton icon="pi pi-arrow-left" class="p-button-text p-button-sm" aria-label="Voltar"></a>
  </div>
  <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-3">
    <div class="flex flex-col gap-1">
      <label class="text-text">Nome *</label>
      <input pInputText formControlName="name" class="w-full" />
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-text">Cargo</label>
      <input pInputText formControlName="roleLabel" placeholder="Técnico, Vendedor..." class="w-full" />
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-text">Telefone</label>
      <input pInputText formControlName="phone" class="w-full" />
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-text">Email</label>
      <input pInputText formControlName="email" type="email" class="w-full" />
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-text">Comissão (%)</label>
      <p-inputNumber formControlName="commissionRate" [min]="0" [max]="100" [minFractionDigits]="2" styleClass="w-full" />
    </div>
    <div class="flex items-center gap-2">
      <p-toggleButton formControlName="isActive" onLabel="Ativo" offLabel="Inativo" />
    </div>
    <div class="flex gap-2 mt-2">
      <button pButton type="submit" label="Salvar" [loading]="saving()" [disabled]="form.invalid"></button>
      <a routerLink="/app/funcionarios" pButton class="p-button-secondary" label="Cancelar"></a>
    </div>
  </form>
</div>
