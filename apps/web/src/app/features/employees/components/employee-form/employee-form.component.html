<p-toast />
<div class="nx-page">
  <app-page-header
    variant="detail"
    backLabel="Voltar para Funcionários"
    backRoute="/app/funcionarios"
    [title]="isEdit ? 'Editar Funcionário' : 'Novo Funcionário'"
    subtitle="Preencha os dados do funcionário"
  />
  <p-card styleClass="w-full">
    <form [formGroup]="form" class="flex flex-col gap-3">
      <div class="flex flex-col gap-1">
        <label class="text-text">Nome *</label>
        <input pInputText formControlName="name" class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-text">Cargo</label>
        <input pInputText formControlName="roleLabel" placeholder="Técnico, Vendedor..." class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-text">Telefone</label>
        <input pInputText formControlName="phone" class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-text">Email</label>
        <input pInputText formControlName="email" type="email" class="w-full" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-text">Comissão (%)</label>
        <p-inputNumber formControlName="commissionRate" [min]="0" [max]="100" [minFractionDigits]="2" styleClass="w-full" />
      </div>
      <div class="flex items-center gap-2">
        <p-toggleButton formControlName="isActive" onLabel="Ativo" offLabel="Inativo" />
      </div>
    </form>
    <ng-template pTemplate="footer">
      <div class="flex justify-end gap-2">
        <a routerLink="/app/funcionarios">
          <p-button label="Cancelar" severity="secondary" [outlined]="true" styleClass="p-button-sm" />
        </a>
        <p-button label="Salvar" icon="pi pi-check" [loading]="saving()" [disabled]="form.invalid"
                  (onClick)="save()" styleClass="p-button-sm" />
      </div>
    </ng-template>
  </p-card>
</div>
