<p-toast />
<p-confirmDialog />

<p-breadcrumb [model]="breadcrumbs" [home]="homeItem" styleClass="nx-breadcrumb mb-4" />

<div class="nx-page">
  <div class="nx-page-header">
    <div>
      <h1 class="nx-page-title">Fornecedores</h1>
      <p class="nx-page-subtitle">Cadastro de fornecedores</p>
    </div>
    <a routerLink="novo" pButton label="Novo Fornecedor" icon="pi pi-plus" class="p-button-sm"></a>
  </div>
  <div class="mb-3">
    <input pInputText [(ngModel)]="search" (input)="load()"
      placeholder="Buscar por nome..." class="w-full md:w-1/3" />
  </div>
  <div class="overflow-x-auto">
    <p-table
      [value]="suppliers()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="tablePage().rows"
      [first]="tablePage().first"
      [rowsPerPageOptions]="rowsPerPageOptions"
      [rowHover]="true"
      sortMode="single"
      styleClass="nx-data-table p-datatable-sm"
      [tableStyle]="{ 'min-width': '760px' }"
      (onPage)="onPageChange($event)"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">Nome <p-sortIcon field="name" /></th>
          <th pSortableColumn="cnpj">CNPJ <p-sortIcon field="cnpj" /></th>
          <th pSortableColumn="contact">Contato <p-sortIcon field="contact" /></th>
          <th pSortableColumn="phone">Telefone <p-sortIcon field="phone" /></th>
          <th pSortableColumn="email">Email <p-sortIcon field="email" /></th>
          <th>Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-s>
        <tr>
          <td>{{ s.name }}</td>
          <td>{{ s.cnpj || '—' }}</td>
          <td>{{ s.contact || '—' }}</td>
          <td>{{ s.phone || '—' }}</td>
          <td>{{ s.email || '—' }}</td>
          <td>
            <a [routerLink]="[s.id, 'editar']" pButton icon="pi pi-pencil"
              class="p-button-sm p-button-text mr-1"></a>
            <button pButton icon="pi pi-trash"
              class="p-button-sm p-button-text p-button-danger"
              (click)="confirmDelete(s)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6">
            <div class="nx-table-empty">
              <span class="nx-table-empty__icon"><i class="pi pi-truck"></i></span>
              <span class="nx-table-empty__title">Nenhum fornecedor encontrado</span>
              <div class="nx-table-empty__description">Cadastre fornecedores para organizar compras e reposições.</div>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="paginatorleft">
        <span class="nx-table-summary">{{ tableSummary() }}</span>
      </ng-template>
    </p-table>
  </div>
</div>
