<p-toast />
<div class="nx-page">
  <div class="nx-page-header">
    <div class="flex items-center gap-3">
      <a routerLink="/app/financeiro">
        <p-button icon="pi pi-arrow-left" [text]="true" severity="secondary" pTooltip="Voltar" tooltipPosition="bottom" styleClass="p-button-sm" />
      </a>
      <div>
        <h1 class="nx-page-title">{{ isEdit() ? 'Editar Lançamento' : 'Novo Lançamento' }}</h1>
        <p class="nx-page-subtitle">Preencha os dados do lançamento</p>
      </div>
    </div>
  </div>
  <p-card styleClass="w-full">
    <form [formGroup]="form" class="flex flex-col gap-3">
      <div class="flex flex-col gap-1">
        <label>Tipo *</label>
        <p-select formControlName="type" [options]="typeOptions" optionLabel="label" optionValue="value" />
      </div>
      <div class="flex flex-col gap-1">
        <label>Descrição *</label>
        <input pInputText formControlName="description" class="w-full" />
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label>Valor Total *</label>
          <p-inputNumber formControlName="totalAmount" mode="currency" currency="BRL" locale="pt-BR" />
        </div>
        <div class="flex flex-col gap-1">
          <label>Vencimento *</label>
          <p-datepicker formControlName="dueDate" dateFormat="dd/mm/yy" [showIcon]="true" styleClass="w-full" />
        </div>
      </div>
      <div class="flex flex-col gap-1">
        <label>Parcelas</label>
        <p-inputNumber formControlName="installmentCount" [min]="1" [max]="60" />
      </div>
      <div class="flex flex-col gap-1">
        <label>Observações</label>
        <textarea pTextarea formControlName="notes" rows="2"></textarea>
      </div>
    </form>
    <ng-template pTemplate="footer">
      <div class="flex justify-end gap-2">
        <a routerLink="/app/financeiro">
          <p-button label="Cancelar" severity="secondary" [outlined]="true" styleClass="p-button-sm" />
        </a>
        <p-button label="Salvar" icon="pi pi-check" [loading]="saving()" [disabled]="form.invalid"
                  (onClick)="save()" styleClass="p-button-sm" />
      </div>
    </ng-template>
  </p-card>
</div>
