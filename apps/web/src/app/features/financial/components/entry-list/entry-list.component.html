<p-toast />
<p-confirmDialog />
<div class="nx-page">
  <app-page-header variant="list" title="Lançamentos" subtitle="Contas a pagar e a receber">
    <div actions class="flex items-center gap-2">
      <a routerLink="caixa" pButton label="Caixa" icon="pi pi-dollar" class="p-button-sm p-button-secondary"></a>
      <a routerLink="plano-de-contas" pButton label="Plano de Contas" icon="pi pi-list" class="p-button-sm p-button-secondary"></a>
      <a routerLink="lancamentos/novo" pButton label="Novo Lançamento" icon="pi pi-plus" class="p-button-sm"></a>
    </div>
  </app-page-header>

  <div class="rounded-xl border border-surface-border bg-surface-elevated shadow-sm overflow-hidden">

    <div class="flex items-center justify-end gap-3 px-4 py-3 border-b border-surface-border flex-wrap">
      <div class="flex items-center gap-2 flex-wrap">
        <p-select [(ngModel)]="filterType" [options]="typeOptions" optionLabel="label" optionValue="value"
          placeholder="Tipo" (onChange)="load()" styleClass="w-36" />
        <p-select [(ngModel)]="filterStatus" [options]="statusOptions" optionLabel="label" optionValue="value"
          placeholder="Status" (onChange)="load()" styleClass="w-36" />
      </div>
    </div>

    <div class="overflow-x-auto">
      <p-table
        [value]="entries()"
        [loading]="loading()"
        [paginator]="true"
        [rows]="tablePage().rows"
        [first]="tablePage().first"
        [rowsPerPageOptions]="rowsPerPageOptions"
        [rowHover]="true"
        sortMode="single"
        styleClass="nx-data-table p-datatable-sm"
        [tableStyle]="{ 'min-width': '860px' }"
        (onPage)="onPageChange($event)"
      >
        <ng-template pTemplate="header">
          <tr>
            <th scope="col" pSortableColumn="description">Descrição <p-sortIcon field="description" /></th>
            <th scope="col" pSortableColumn="type">Tipo <p-sortIcon field="type" /></th>
            <th scope="col" pSortableColumn="totalAmount">Total <p-sortIcon field="totalAmount" /></th>
            <th scope="col" pSortableColumn="paidAmount">Pago <p-sortIcon field="paidAmount" /></th>
            <th scope="col" pSortableColumn="dueDate">Vencimento <p-sortIcon field="dueDate" /></th>
            <th scope="col" pSortableColumn="status">Status <p-sortIcon field="status" /></th>
            <th scope="col">Ações</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-e>
          <tr class="group">
            <td>{{ e.description }}</td>
            <td>
              <p-tag [severity]="e.type === 'receivable' ? 'success' : 'danger'"
                [value]="e.type === 'receivable' ? 'A Receber' : 'A Pagar'" />
            </td>
            <td>{{ e.totalAmount | currency:'BRL' }}</td>
            <td>{{ e.paidAmount | currency:'BRL' }}</td>
            <td>{{ e.dueDate | date:'dd/MM/yyyy' }}</td>
            <td><p-tag [severity]="statusSeverity(e.status)" [value]="statusLabel(e.status)" /></td>
            <td>
              <div class="flex items-center justify-end gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
                <a [routerLink]="['lancamentos', e.id]" pButton icon="pi pi-eye" class="p-button-sm p-button-text" aria-label="Ver detalhes"></a>
                <button pButton icon="pi pi-trash" class="p-button-sm p-button-text p-button-danger" (click)="confirmDelete(e)" aria-label="Excluir"></button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="7">
              <div class="nx-table-empty">
                <span class="nx-table-empty__icon"><i class="pi pi-wallet"></i></span>
                <span class="nx-table-empty__title">Nenhum lançamento encontrado</span>
                <div class="nx-table-empty__description">Os recebíveis e pagáveis aparecerão aqui conforme forem cadastrados.</div>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="paginatorleft">
          <span class="nx-table-summary">{{ tableSummary() }}</span>
        </ng-template>
      </p-table>
    </div>

  </div>
</div>
