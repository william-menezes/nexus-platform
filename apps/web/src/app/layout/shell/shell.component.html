<div class="flex h-screen overflow-hidden bg-slate-50 dark:bg-slate-950">

  <!-- ══ BACKDROP mobile — aparece quando o sidebar está aberto no mobile ══ -->
  @if (layout.sidebarVisible()) {
    <div
      class="fixed inset-0 bg-black/50 z-40 lg:hidden"
      (click)="layout.closeSidebar()"
    ></div>
  }

  <!-- ══ SIDEBAR — estático no desktop, overlay fixed no mobile ══ -->
  <app-sidebar />

  <!-- ══ ÁREA PRINCIPAL ══ -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Header extraído para componente dedicado -->
    <app-header />

    <!-- Conteúdo da página -->
    <main class="flex-1 overflow-y-auto">
      <div class="mx-auto w-full max-w-7xl px-4 md:px-6 lg:px-8 py-6">
        <router-outlet />
      </div>
    </main>

  </div>

</div>
