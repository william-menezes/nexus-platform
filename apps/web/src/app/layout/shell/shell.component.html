<div class="flex h-screen bg-surface-muted overflow-hidden">

  <!-- Sidebar -->
  <aside
    class="flex flex-col bg-white border-r border-surface-border shrink-0 transition-[width] duration-200 motion-reduce:transition-none"
    [class]="sidebarOpen() ? 'w-64' : 'w-16'"
  >
    <!-- Brand -->
    <div class="flex items-center gap-3 px-4 h-16 border-b border-surface-border shrink-0">
      <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-primary-500 text-white font-bold text-sm shrink-0">
        N
      </div>
      @if (sidebarOpen()) {
        <span class="font-display font-semibold text-text text-base truncate">Nexus</span>
      }
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-3 px-2 space-y-0.5" aria-label="Menu principal">
      @for (item of nav; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-primary-50 text-primary-700 font-medium"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary text-sm
                 hover:bg-surface-muted hover:text-text transition-colors
                 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500 focus-visible:ring-inset"
          [attr.title]="sidebarOpen() ? null : item.label"
          [attr.aria-label]="item.label"
        >
          <i [class]="item.icon + ' text-[1rem] w-5 text-center shrink-0'"></i>
          @if (sidebarOpen()) {
            <span class="truncate">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- User area -->
    <div class="border-t border-surface-border p-3 flex items-center gap-2 shrink-0">
      <div
        class="w-8 h-8 rounded-full bg-primary-500 text-white text-xs font-semibold
               flex items-center justify-center shrink-0 select-none"
        aria-hidden="true"
      >
        {{ userInitial }}
      </div>
      @if (sidebarOpen()) {
        <div class="flex-1 min-w-0">
          <p class="text-xs text-text-secondary truncate">{{ userEmail }}</p>
        </div>
      }
      <button
        (click)="logout()"
        class="p-1.5 rounded-md text-text-muted hover:text-danger-600 hover:bg-danger-50 transition-colors
               focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-danger-500 ml-auto"
        aria-label="Sair da conta"
        title="Sair"
      >
        <i class="pi pi-sign-out text-sm"></i>
      </button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Top bar -->
    <header class="h-16 bg-white border-b border-surface-border flex items-center gap-4 px-4 sticky top-0 z-30 shrink-0">
      <button
        (click)="toggleSidebar()"
        class="p-2 rounded-lg text-text-secondary hover:bg-surface-muted hover:text-text transition-colors
               focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
        aria-label="Alternar menu lateral"
      >
        <i class="pi pi-bars"></i>
      </button>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto">
      <div class="mx-auto w-full max-w-7xl px-4 md:px-6 lg:px-8 py-6">
        <router-outlet />
      </div>
    </main>

  </div>

</div>
