<!-- Brand header -->
<div class="flex items-center gap-3 px-4 h-14 border-b border-slate-100 shrink-0">
  @if (tenant.logoUrl()) {
    <img [src]="tenant.logoUrl()" alt="Logo" class="h-7 w-auto object-contain" />
  } @else {
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shrink-0">
      <i class="pi pi-wrench text-white text-sm"></i>
    </div>
  }
  <span class="font-bold text-slate-900 dark:text-white text-sm truncate flex-1 min-w-0">
    {{ tenant.logoUrl() ? tenant.name() : 'SimplificaOS' }}
  </span>
</div>

<!-- Nav + Footer via componente compartilhado -->
<app-sidebar-nav />
